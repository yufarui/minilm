# SFT 对话 JSONL：每行含 conversations（OpenAI 风格 role/content，可选 tool_calls）
kind: sft
input: data/sft_raw.jsonl
output: data/sft_clean.jsonl
stats_path: data/sft_clean_stats.json
write_plots: false

split:
  sft:
    enabled: true
    tool_call_val_size: 1000
    multi_turn_val_size: 5000
    tool_call_val_output_path: data/sft/val_tool_call.jsonl
    multi_turn_val_output_path: data/sft/val_multi_turn.jsonl
    seed: 42

sft:
  conversations_field: conversations
  strict_role_order: false
  repair_tool_calls: true
  # 将数据里混用的别名统一成模板使用的标记（无则写 {}）
  normalize_markers: {}
  filter_refuse_replies: true
  refuse_extra_substrings: []
  min_chars: 20
  max_chars: 200000
  truncate: true
  max_non_printable_ratio: 0.05
  max_punctuation_ratio: 0.55
  # null：默认仅 zh-cn + en；[]：不做语言过滤
  allowed_langs: null
  lang_backend: langdetect
  # lang_backend: fasttext 时填写 .bin 路径
  # fasttext_model_path: third_party/lid.176.bin
  exact_dedup: true
  exact:
    algorithm: sha1
  near_dedup:
    enabled: true
    threshold: 0.9
    num_perm: 128
    shingle_size: 5
  tokenizer_path_for_diagnostics: tokenizer/minilm
  max_rows_token_histogram: 3000
  run_diagnostics: true
